set default=0
set timeout=5

loadfont $prefix/live-theme/terminus-14.pf2
loadfont $prefix/live-theme/unifont-16.pf2
loadfont $prefix/unicode.pf2
set gfxmode=auto
insmod all_video
insmod gfxterm
insmod png
insmod jpeg

set color_normal=light-gray/black
set color_highlight=white/black

set theme=/boot/grub/live-theme/theme.txt

terminal_output gfxterm

insmod play
play 960 440 1 0 4 440 1

# Check for Snapdragon X DTBs (ARM64 ISO only - does not exist on amd64)
set has_dtbs=0
if [ -d /live/dtbs/qcom ]; then
    set has_dtbs=1
fi

# --- Main boot entry ---
# Generic DTB first for widest Snapdragon X compatibility.
# On x86, no DTBs exist so standard ACPI boot is used.
menuentry "OxyOS Live" --class oxyos --class linux {
    linux KERNEL_LIVE APPEND_LIVE
    initrd INITRD_LIVE
    if [ -f /live/dtbs/qcom/x1e80100-crd.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-crd.dtb
    elif [ -f /live/dtbs/qcom/x1p64100-crd.dtb ]; then
        devicetree /live/dtbs/qcom/x1p64100-crd.dtb
    elif [ -f /live/dtbs/qcom/x1e80100-microsoft-romulus15.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus15.dtb
    elif [ -f /live/dtbs/qcom/x1e80100-microsoft-romulus13.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus13.dtb
    elif [ -f /live/dtbs/qcom/x1e80100-microsoft-denali-oled.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-microsoft-denali-oled.dtb
    elif [ -f /live/dtbs/qcom/x1p64100-microsoft-denali.dtb ]; then
        devicetree /live/dtbs/qcom/x1p64100-microsoft-denali.dtb
    fi
}

# --- Surface Laptop 7 (15") quick entry ---
menuentry "OxyOS Live (Surface Laptop 7 15\")" --class oxyos --class linux {
    linux KERNEL_LIVE APPEND_LIVE modprobe.blacklist=msm,surface_hid,surface_aggregator,surface_aggregator_registry,surface_aggregator_hub
    initrd INITRD_LIVE
    if [ -f /live/dtbs/qcom/x1e80100-microsoft-romulus15.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus15.dtb
    elif [ -f /live/dtbs/qcom/x1e80100-crd.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-crd.dtb
    fi
}

# --- Surface Laptop 7 (15") safe graphics boot ---
menuentry "OxyOS Live (Surface Laptop 7 15\" safe graphics)" --class oxyos --class linux {
    linux KERNEL_LIVE APPEND_LIVE_FAILSAFE modprobe.blacklist=msm,surface_hid,surface_aggregator,surface_aggregator_registry,surface_aggregator_hub
    initrd INITRD_LIVE
    if [ -f /live/dtbs/qcom/x1e80100-microsoft-romulus15.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus15.dtb
    elif [ -f /live/dtbs/qcom/x1e80100-crd.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-crd.dtb
    fi
}

# --- Failsafe ---
menuentry "OxyOS Live (failsafe)" --class oxyos --class linux {
    linux KERNEL_LIVE APPEND_LIVE_FAILSAFE
    initrd INITRD_LIVE
    if [ -f /live/dtbs/qcom/x1e80100-crd.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-crd.dtb
    elif [ -f /live/dtbs/qcom/x1p64100-crd.dtb ]; then
        devicetree /live/dtbs/qcom/x1p64100-crd.dtb
    elif [ -f /live/dtbs/qcom/x1e80100-microsoft-romulus15.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus15.dtb
    elif [ -f /live/dtbs/qcom/x1e80100-microsoft-romulus13.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus13.dtb
    elif [ -f /live/dtbs/qcom/x1e80100-microsoft-denali-oled.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-microsoft-denali-oled.dtb
    elif [ -f /live/dtbs/qcom/x1p64100-microsoft-denali.dtb ]; then
        devicetree /live/dtbs/qcom/x1p64100-microsoft-denali.dtb
    fi
}

# --- ACPI boot (for non-Snapdragon ARM64 or diagnostics) ---
menuentry "OxyOS Live (ACPI only)" --class oxyos --class linux {
    linux KERNEL_LIVE APPEND_LIVE
    initrd INITRD_LIVE
}

# Installer (if any)
LINUX_INSTALL

submenu 'Advanced options...' {

# More installer entries (if any)
LINUX_ADVANCED_INSTALL

# Memtest (if any)
MEMTEST

# --- Device-specific DTB selection ---
# For optimal hardware support, select your exact device model.
if [ "$has_dtbs" = "1" ]; then
    submenu 'Select device...' {
        menuentry "Microsoft Surface Pro 11 (OLED)" --class oxyos --class linux {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-microsoft-denali-oled.dtb
        }
        menuentry "Microsoft Surface Pro 11 (LCD)" --class oxyos --class linux {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1p64100-microsoft-denali.dtb
        }
        menuentry "Microsoft Surface Laptop 7 13\"" --class oxyos --class linux {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus13.dtb
        }
        menuentry "Microsoft Surface Laptop 7 15\"" --class oxyos --class linux {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus15.dtb
        }
        menuentry "Lenovo Yoga Slim 7x" --class oxyos --class linux {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-lenovo-yoga-slim7x.dtb
        }
        menuentry "ASUS Vivobook S15" --class oxyos --class linux {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-asus-vivobook-s15.dtb
        }
        menuentry "Dell XPS 13 9345" --class oxyos --class linux {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-dell-xps13-9345.dtb
        }
        menuentry "HP OmniBook X14" --class oxyos --class linux {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-hp-omnibook-x14.dtb
        }
        menuentry "Qualcomm CRD (generic Snapdragon X)" --class oxyos --class linux {
