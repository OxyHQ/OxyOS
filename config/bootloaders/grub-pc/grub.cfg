set default=0
set timeout=5

loadfont $prefix/dejavu-bold-16.pf2
loadfont $prefix/dejavu-bold-14.pf2
loadfont $prefix/unicode.pf2
set gfxmode=auto
insmod all_video
insmod gfxterm
insmod png

set color_normal=light-gray/black
set color_highlight=white/black

if [ -e /isolinux/splash.png ]; then
    set theme=/boot/grub/live-theme/theme.txt
elif [ -e /boot/grub/splash.png ]; then
    set theme=/boot/grub/live-theme/theme.txt
else
    set menu_color_normal=cyan/blue
    set menu_color_highlight=white/blue
fi

terminal_output gfxterm

insmod play
play 960 440 1 0 4 440 1

# --- DTB auto-detection for Snapdragon X ---
# Try to find a matching DTB based on available files.
# The binary hook (0920) copies DTBs to /live/dtbs/ on the ISO.
set dtb_path=""
set has_dtbs=0

# Check for Snapdragon X Elite/Plus DTBs
if [ -d /live/dtbs/qcom ]; then
    set has_dtbs=1
fi

# Live boot with DTB (primary entry for ARM64 Snapdragon X)
menuentry "OxyOS Live" {
    linux KERNEL_LIVE APPEND_LIVE
    initrd INITRD_LIVE
    if [ "$has_dtbs" = "1" ]; then
        # Try device-specific DTBs first, fall back to CRD (reference design)
        if [ -f /live/dtbs/qcom/x1e80100-microsoft-romulus13.dtb ]; then
            devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus13.dtb
        elif [ -f /live/dtbs/qcom/x1e80100-microsoft-romulus.dtb ]; then
            devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus.dtb
        elif [ -f /live/dtbs/qcom/x1e80100-lenovo-yoga-slim7x.dtb ]; then
            devicetree /live/dtbs/qcom/x1e80100-lenovo-yoga-slim7x.dtb
        elif [ -f /live/dtbs/qcom/x1e80100-asus-vivobook-s15.dtb ]; then
            devicetree /live/dtbs/qcom/x1e80100-asus-vivobook-s15.dtb
        elif [ -f /live/dtbs/qcom/x1e80100-crd.dtb ]; then
            devicetree /live/dtbs/qcom/x1e80100-crd.dtb
        elif [ -f /live/dtbs/qcom/x1e80100-qcp.dtb ]; then
            devicetree /live/dtbs/qcom/x1e80100-qcp.dtb
        fi
    fi
}

# Live boot without DTB (ACPI only - for non-Snapdragon ARM64 or x86)
menuentry "OxyOS Live (ACPI only)" {
    linux KERNEL_LIVE APPEND_LIVE
    initrd INITRD_LIVE
}

# Failsafe
menuentry "OxyOS Live (failsafe)" {
    linux KERNEL_LIVE APPEND_LIVE_FAILSAFE
    initrd INITRD_LIVE
}

# Installer (if any)
LINUX_INSTALL

submenu 'Advanced options...' {

# More installer entries (if any)
LINUX_ADVANCED_INSTALL

# Memtest (if any)
MEMTEST

# Manual DTB selection for specific devices
if [ "$has_dtbs" = "1" ]; then
    submenu 'Select device DTB...' {
        menuentry "Microsoft Surface Laptop 7" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus13.dtb
        }
        menuentry "Lenovo ThinkPad T14s Gen 6" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-lenovo-thinkpad-t14s-gen6.dtb
        }
        menuentry "Lenovo Yoga Slim 7x" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-lenovo-yoga-slim7x.dtb
        }
        menuentry "ASUS Vivobook S15" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-asus-vivobook-s15.dtb
        }
        menuentry "Qualcomm CRD (generic)" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-crd.dtb
        }
    }
fi

}
