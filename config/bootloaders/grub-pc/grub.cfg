set default=0
set timeout=5

loadfont $prefix/dejavu-bold-16.pf2
loadfont $prefix/dejavu-bold-14.pf2
loadfont $prefix/unicode.pf2
set gfxmode=auto
insmod all_video
insmod gfxterm
insmod png

set color_normal=light-gray/black
set color_highlight=white/black

if [ -e /isolinux/splash.png ]; then
    set theme=/boot/grub/live-theme/theme.txt
elif [ -e /boot/grub/splash.png ]; then
    set theme=/boot/grub/live-theme/theme.txt
else
    set menu_color_normal=cyan/blue
    set menu_color_highlight=white/blue
fi

terminal_output gfxterm

insmod play
play 960 440 1 0 4 440 1

# Check for Snapdragon X DTBs (ARM64 ISO only — does not exist on amd64)
set has_dtbs=0
if [ -d /live/dtbs/qcom ]; then
    set has_dtbs=1
fi

# --- Main boot entry ---
# Loads CRD DTB for Snapdragon X devices. On x86, no DTBs exist so
# the devicetree command is skipped and standard ACPI boot is used.
menuentry "OxyOS Live" {
    linux KERNEL_LIVE APPEND_LIVE
    initrd INITRD_LIVE
    if [ -f /live/dtbs/qcom/x1e80100-crd.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-crd.dtb
    fi
}

# --- Failsafe ---
menuentry "OxyOS Live (failsafe)" {
    linux KERNEL_LIVE APPEND_LIVE_FAILSAFE
    initrd INITRD_LIVE
    if [ -f /live/dtbs/qcom/x1e80100-crd.dtb ]; then
        devicetree /live/dtbs/qcom/x1e80100-crd.dtb
    fi
}

# --- ACPI boot (for non-Snapdragon ARM64 or diagnostics) ---
menuentry "OxyOS Live (ACPI only)" {
    linux KERNEL_LIVE APPEND_LIVE
    initrd INITRD_LIVE
}

# Installer (if any)
LINUX_INSTALL

submenu 'Advanced options...' {

# More installer entries (if any)
LINUX_ADVANCED_INSTALL

# Memtest (if any)
MEMTEST

# --- Device-specific DTB selection ---
# For optimal hardware support, select your exact device model.
if [ "$has_dtbs" = "1" ]; then
    submenu 'Select device...' {
        menuentry "Microsoft Surface Laptop 7 13\"" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus13.dtb
        }
        menuentry "Microsoft Surface Laptop 7 15\"" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus15.dtb
        }
        menuentry "Lenovo Yoga Slim 7x" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-lenovo-yoga-slim7x.dtb
        }
        menuentry "ASUS Vivobook S15" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-asus-vivobook-s15.dtb
        }
        menuentry "Dell XPS 13 9345" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-dell-xps13-9345.dtb
        }
        menuentry "HP OmniBook X14" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-hp-omnibook-x14.dtb
        }
        menuentry "Qualcomm CRD (generic Snapdragon X)" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-crd.dtb
        }
    }
fi

}
