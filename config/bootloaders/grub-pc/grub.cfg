set default=0
set timeout=5

loadfont $prefix/dejavu-bold-16.pf2
loadfont $prefix/dejavu-bold-14.pf2
loadfont $prefix/unicode.pf2
set gfxmode=auto
insmod all_video
insmod gfxterm
insmod png

set color_normal=light-gray/black
set color_highlight=white/black

if [ -e /isolinux/splash.png ]; then
    set theme=/boot/grub/live-theme/theme.txt
elif [ -e /boot/grub/splash.png ]; then
    set theme=/boot/grub/live-theme/theme.txt
else
    set menu_color_normal=cyan/blue
    set menu_color_highlight=white/blue
fi

terminal_output gfxterm

insmod play
play 960 440 1 0 4 440 1

# Check for Snapdragon X Elite/Plus DTBs (used in Advanced submenu)
set has_dtbs=0
if [ -d /live/dtbs/qcom ]; then
    set has_dtbs=1
fi

# Live boot (ACPI - works with kernel 6.18+ on Snapdragon X)
menuentry "OxyOS Live" {
    linux KERNEL_LIVE APPEND_LIVE
    initrd INITRD_LIVE
}

# Failsafe
menuentry "OxyOS Live (failsafe)" {
    linux KERNEL_LIVE APPEND_LIVE_FAILSAFE
    initrd INITRD_LIVE
}

# Installer (if any)
LINUX_INSTALL

submenu 'Advanced options...' {

# More installer entries (if any)
LINUX_ADVANCED_INSTALL

# Memtest (if any)
MEMTEST

# Manual DTB selection for specific devices
if [ "$has_dtbs" = "1" ]; then
    submenu 'Select device DTB...' {
        menuentry "Microsoft Surface Laptop 7" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-microsoft-romulus13.dtb
        }
        menuentry "Lenovo ThinkPad T14s Gen 6" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-lenovo-thinkpad-t14s-gen6.dtb
        }
        menuentry "Lenovo Yoga Slim 7x" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-lenovo-yoga-slim7x.dtb
        }
        menuentry "ASUS Vivobook S15" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-asus-vivobook-s15.dtb
        }
        menuentry "Qualcomm CRD (generic)" {
            linux KERNEL_LIVE APPEND_LIVE
            initrd INITRD_LIVE
            devicetree /live/dtbs/qcom/x1e80100-crd.dtb
        }
    }
fi

}
